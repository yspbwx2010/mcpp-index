# Minimal example: nlohmann/json consumed as the C++23 module `nlohmann.json`.
# Run from this directory:  mcpp run   (index path is relative to repo root)
[package]
name = "nlohmann-json-example"
version = "0.1.0"

[toolchain]
default = "gcc@16.1.0"

[indices]
nlohmann = { path = "../../.." }

[dependencies.nlohmann]
json = "3.12.0"

[targets.nlohmann-json-example]
kind = "bin"
main = "src/main.cpp"
