# OpenBLAS test project (L1-cfg consumer): openblas is a Windows-only runtime dep
# (import lib + DLL); on linux/macos the test is a no-op. Exercises mcpp's
# platform-conditional [target.'cfg(...)'] deps + flags + windows-runtime-DLL
# deployment. Resolves the openblas recipe from this repo's own index.
[package]
name    = "openblas-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[target.'cfg(windows)'.dependencies.compat]
openblas = "0.3.33"
[target.'cfg(windows)'.build]
cxxflags = ["-DHAVE_OPENBLAS=1"]
