# Eigen test project: header-only linear algebra, asserted under `mcpp test`.
# Resolves compat.eigen (source build puts the tree root on the include path)
# from this repo's own index.
[package]
name = "eigen-tests"
version = "0.1.0"

[indices]
compat = { path = "../../.." }

[dependencies.compat]
eigen = "5.0.1"
